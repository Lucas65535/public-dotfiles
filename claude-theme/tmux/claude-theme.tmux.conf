# Claude Code Theme — tmux configuration for gpakosz/.tmux
# Merge into ~/.tmux.conf.local
#
# gpakosz/.tmux uses tmux_conf_theme_* variables for theming.
# Paste this block into your .tmux.conf.local to apply the Claude Code palette.

# ── Window Style ──
tmux_conf_theme_window_fg="default"
tmux_conf_theme_window_bg="default"

# ── Highlight / Active Pane ──
tmux_conf_theme_focused_pane_bg="default"

# ── Pane Borders ──
# Inactive pane border
tmux_conf_theme_pane_border="#4A473F"
# Active pane border — uses Claude accent terracotta
tmux_conf_theme_pane_active_border="#D4967E"

# ── Pane Indicators ──
tmux_conf_theme_pane_indicator="#D4967E"
tmux_conf_theme_pane_active_indicator="#D4967E"

# ── Status Bar ──
tmux_conf_theme_message_fg="#141413"
tmux_conf_theme_message_bg="#E8C96B"
tmux_conf_theme_message_attr="bold"

# ── Command Prompt ──
tmux_conf_theme_message_command_fg="#E8C96B"
tmux_conf_theme_message_command_bg="#141413"
tmux_conf_theme_message_command_attr="bold"

# ── Copy Mode Highlight ──
tmux_conf_theme_mode_fg="#141413"
tmux_conf_theme_mode_bg="#D4967E"
tmux_conf_theme_mode_attr="bold"

# ── Status Line (overall) ──
tmux_conf_theme_status_fg="#A9A39A"
tmux_conf_theme_status_bg="#1A1917"
tmux_conf_theme_status_attr="none"

# ── Terminal Title ──
tmux_conf_theme_terminal_title="#h ❐ #S ● #I #W"

# ── Window Status (inactive) ──
tmux_conf_theme_window_status_fg="#A9A39A"
tmux_conf_theme_window_status_bg="#1A1917"
tmux_conf_theme_window_status_attr="none"
tmux_conf_theme_window_status_format="#I #W#{?window_bell_flag,🔔,}#{?window_zoomed_flag,🔍,}"

# ── Window Status (current / active) ──
tmux_conf_theme_window_status_current_fg="#141413"
tmux_conf_theme_window_status_current_bg="#D4967E"
tmux_conf_theme_window_status_current_attr="bold"
tmux_conf_theme_window_status_current_format="#I #W#{?window_zoomed_flag,🔍,}"

# ── Window Status (activity) ──
tmux_conf_theme_window_status_activity_fg="default"
tmux_conf_theme_window_status_activity_bg="default"
tmux_conf_theme_window_status_activity_attr="underscore"

# ── Window Status (bell) ──
tmux_conf_theme_window_status_bell_fg="#E8C96B"
tmux_conf_theme_window_status_bell_bg="default"
tmux_conf_theme_window_status_bell_attr="blink,bold"

# ── Window Status (last) ──
tmux_conf_theme_window_status_last_fg="#D4967E"
tmux_conf_theme_window_status_last_bg="default"
tmux_conf_theme_window_status_last_attr="none"

# ── Status Left ──
tmux_conf_theme_status_left=" ❐ #S "
tmux_conf_theme_status_left_fg="#141413,#EAE7DF,#EAE7DF"
tmux_conf_theme_status_left_bg="#D4967E,#2B2A27,#1A1917"
tmux_conf_theme_status_left_attr="bold,none,none"

# ── Status Right ──
tmux_conf_theme_status_right=" #{prefix}#{mouse}#{pairing}#{synchronized}#{?battery_status,#{battery_status},}#{?battery_bar, #{battery_bar},}#{?battery_percentage, #{battery_percentage},} , %R , %d %b "
tmux_conf_theme_status_right_fg="#A9A39A,#EAE7DF,#141413"
tmux_conf_theme_status_right_bg="#1A1917,#2B2A27,#D4967E"
tmux_conf_theme_status_right_attr="none,none,bold"

# ── Status Left/Right Separators ──
tmux_conf_theme_left_separator_main=""
tmux_conf_theme_left_separator_sub="|"
tmux_conf_theme_right_separator_main=""
tmux_conf_theme_right_separator_sub="|"

# ── Clock ──
tmux_conf_theme_clock_colour="#D4967E"
tmux_conf_theme_clock_style="24"

# ── Prefix Indicator ──
tmux_conf_theme_prefix="#D4967E"
tmux_conf_theme_prefix_fg="none"
tmux_conf_theme_prefix_bg="none"
tmux_conf_theme_prefix_attr="none"

# Copy mode / mouse selection
set -g mode-style "fg=#EAE7DF,bg=#574238"
set -g copy-mode-selection-style "fg=#EAE7DF,bg=#574238"
set -g copy-mode-position-style "fg=#141413,bg=#D4967E,bold"
set -g copy-mode-match-style "fg=#EAE7DF,bg=#2B2A27"
set -g copy-mode-current-match-style "fg=#141413,bg=#D4967E,bold"
set -g copy-mode-mark-style "fg=#EAE7DF,bg=#332F29"
