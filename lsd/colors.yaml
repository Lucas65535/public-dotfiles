# Claude-inspired dark theme for lsd.
# Source of truth: claude-theme/palette.md (Dark Palette)
# lsd only themes metadata/status columns; file type colors still come from LS_COLORS.
user: 180      # accent / terracotta
group: 222     # warm yellow
permission:
  read: 150        # success green
  write: 222       # warning yellow
  exec: 180        # accent terracotta
  exec-sticky: 141 # decorator purple
  no-access: 174   # error red
  octal: 75        # info blue
  acl: 141         # decorator purple
  context: 109     # muted cyan-blue
date:
  hour-old: 150
  day-old: 222
  older: 245
size:
  none: 245
  small: 150
  medium: 222
  large: 174
inode:
  valid: 141
  invalid: 245
links:
  valid: 75
  invalid: 245
tree-edge: 245
git-status:
  default: 245
  unmodified: 245
  ignored: 242
  new-in-index: 150
  new-in-workdir: 150
  typechange: 222
  deleted: 174
  renamed: 75
  modified: 222
  conflicted: 174
