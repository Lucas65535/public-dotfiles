palette = "claude_dark"

format = """
$azure\
$kubernetes\
$directory\
$git_branch\
$git_status\
$git_commit\
$python\
$nodejs\
$rust\
$golang\
$java\
$line_break$character\
"""
right_format = """$time"""

[line_break]
disabled = false

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[time]
style = 'fg:overlay1'
format = '[ 󰥔 $time ]($style)'
disabled = false
time_format = "%m-%d %H:%M"

[directory]
truncation_length = 3
truncation_symbol = "…/"
format = "[](peach)[󰝰](fg:#69493B bg:peach)[ $path]($style)[$read_only]($read_only_style)[ ](peach)"
read_only = " "
style = "bg:peach fg:#69493B bold"
read_only_style = "bg:peach fg:#87584E bold"

[git_branch]
symbol = ""
style = 'bg:mauve fg:#5B536F'
format = '[](mauve)[](fg:#5B536F bg:mauve)[ $branch]($style)[ ](mauve)'

[git_status]
format = '[](teal)[$all_status$ahead_behind]($style)[ ](teal)'
style = "bg:teal fg:#48615D"
conflicted = '=${count}'
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
up_to_date = '✓'
untracked = '?${count}'
stashed = '*${count}'
modified = '!${count}'
staged = '+${count}'
renamed = '»${count}'
deleted = '✘${count}'

[git_commit]
only_detached = false
disabled = false
commit_hash_length = 7
format = '[](yellow)[](fg:#6E5734 bg:yellow)[ $hash]($style)[$tag]($style)[ ](yellow)'
tag_symbol = "🔖"
style = "bg:yellow fg:#6E5734"

[kubernetes]
disabled = false
format = '[](lavender)[󱃾](fg:#595D7A bg:lavender)[ $context]($style)[ ](lavender)'
# format = 'via [$symbol $context\($namespace\)](bold purple) '
symbol = "⎈ "
style = "bg:lavender fg:#595D7A"

[[kubernetes.contexts]]
context_pattern = "aks-gitlab-runner"
context_alias = "gitlab-runner"

[[kubernetes.contexts]]
context_pattern = "aks-(?P<cluster>[\\w-]+)"
context_alias = "$cluster"

[azure]
disabled = false
format = "[](blue)[󰠅](fg:#506273 bg:blue)[ $subscription]($style)[ ](blue)"
symbol = "󰠅 "
style = "bg:blue fg:#506273"

[azure.subscription_aliases]
"SUB22013162557" = "開発"
"Azure subscription 1" = "本番"
"SUB24092532288_20240930" = "gitlab"

[python]
format = "[](surface1)[](fg:green bg:surface1)[$virtualenv( $version) ]($style)[ ](surface1)"
style = "bg:surface1 fg:overlay1"

[nodejs]
symbol = ''
format = "[](surface1)[$symbol](fg:green bg:surface1)[( $version)]($style)[ ](surface1)"
style = "bg:surface1 fg:overlay1"

[rust]
symbol = ""
format = "[](surface1)[$symbol](fg:rosewater bg:surface1)[( $version)]($style)[ ](surface1)"
style = "bg:surface1 fg:overlay1"

[golang]
symbol = ""
format = "[](surface1)[$symbol](fg:sky bg:surface1)[( $version)]($style)[ ](surface1)"
style = "bg:surface1 fg:overlay1"

[java]
symbol = ""
format = "[](surface1)[$symbol](fg:peach bg:surface1)[( $version)]($style)[ ](surface1)"
style = "bg:surface1 fg:overlay1"

