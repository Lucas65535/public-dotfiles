# Claude/tmux-style Herdr config.
# Herdr reads this through ~/.config/herdr/config.toml.

onboarding = false

[theme]
name = "terminal"

[theme.custom]
panel_bg = "#0B0B0A"
surface0 = "#141413"
surface1 = "#2B2A27"
surface_dim = "#141413"
overlay0 = "#6B665F"
overlay1 = "#A9A39A"
text = "#EAE7DF"
subtext0 = "#A9A39A"
accent = "#D4967E"
red = "#D47563"
green = "#9ACA86"
blue = "#61AAF2"
yellow = "#E8C96B"
teal = "#8CC4FF"
peach = "#D4967E"
mauve = "#9B87F5"

[terminal]
shell_mode = "auto"
new_cwd = "follow"

[keys]
prefix = "ctrl+a"
detach = "prefix+d"
reload_config = "prefix+shift+r"
workspace_picker = "prefix+w"
new_tab = "prefix+c"
rename_tab = "prefix+comma"
previous_tab = "prefix+p"
next_tab = "prefix+n"
switch_tab = "prefix+1..9"
close_tab = "prefix+ampersand"
focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"
split_vertical = "prefix+v"
split_horizontal = "prefix+minus"
close_pane = "prefix+x"
zoom = "prefix+z"
resize_mode = "prefix+r"
toggle_sidebar = "prefix+b"

[ui]
mouse_capture = true
mouse_scroll_lines = 3
pane_borders = true
pane_gaps = false
agent_panel_sort = "priority"
accent = "#D4967E"

[ui.toast]
delivery = "off"

[advanced]
scrollback_limit_bytes = 10000000
